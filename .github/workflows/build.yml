name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read release identity
        run: |
          echo "VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$(tr -d '[:space:]' < BUILD_NUMBER)" >> "$GITHUB_ENV"

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./scripts/build_app.sh

      - name: Build DMG
        run: ./scripts/create_dmg.sh

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monthly-video-generator-macos-universal
          path: dist/*.dmg
          retention-days: 30
